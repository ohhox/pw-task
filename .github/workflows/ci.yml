# =============================================================================
# CI Workflow
# =============================================================================
# Name:      CI
# Triggers:  push and pull_request on every branch
# Platforms: ubuntu-latest, windows-latest, macos-latest
#
# Required secrets:
#   - GITHUB_TOKEN (auto-provided by GitHub Actions; no manual setup needed)
#
# Typical runtime expectations (cold cache / warm cache):
#   - ubuntu-latest:  ~6-9 min cold, ~3-5 min warm (apt install adds ~1-2 min)
#   - windows-latest: ~9-13 min cold, ~5-7 min warm (Rust build slowest here)
#   - macos-latest:   ~7-10 min cold, ~4-6 min warm
#
# Caches used:
#   - actions/setup-node@v4  -> npm cache (package-lock.json hash)
#   - Swatinem/rust-cache@v2 -> cargo registry, git, target/ (src-tauri workspace)
#
# fail-fast is disabled so a single OS failure does not cancel the others;
# this gives clearer signal when debugging cross-platform issues.
# =============================================================================

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install Linux Tauri system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build frontend (Vite)
        run: npm run build:vite

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
