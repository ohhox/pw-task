# =============================================================================
# Release Workflow
# =============================================================================
# Name:      Release
# Triggers:  push of a tag matching v* (e.g. v0.1.0), or manual dispatch
# Platforms: Linux x64, Windows x64, macOS arm64 (M-series), macOS x64
#
# Required secrets:
#   - GITHUB_TOKEN (auto-provided by GitHub Actions; no manual setup needed)
#
# Code signing: deferred to Phase 2
#   Windows: TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   macOS:   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_ID / etc.
#
# Notes:
#   - Linux runner is pinned to ubuntu-22.04 because libwebkit2gtk-4.1-dev is
#     not available on ubuntu-24.04 (Tauri 2.x requirement).
#   - Each matrix leg uploads its own artifacts; tauri-action merges them into
#     a single draft GitHub Release keyed by tagName.
#   - fail-fast is disabled so one leg failure does not cancel the others.
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc   }
          - { os: macos-latest,   target: aarch64-apple-darwin      }
          - { os: macos-latest,   target: x86_64-apple-darwin       }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install Linux Tauri system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Task Flow ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
