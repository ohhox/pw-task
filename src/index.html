<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Task Flow</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── TOPBAR ───────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">PwTask</div>
    </div>

    <div class="search-box" id="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="topbar-search-input" placeholder="Search tasks, projects, agents…" type="text">
      <kbd class="kbd-hint">⌘K</kbd>
    </div>

    <span class="topbar-spacer"></span>

    <span id="save-status"></span>

    <button class="icon-btn" id="btn-archive" title="Archive done tasks" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    </button>
    <button class="icon-btn" id="btn-sync" title="Check for new patches" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="icon-btn" id="btn-font-size" title="Font size">A</button>
    <button class="icon-btn" id="btn-agent-mgr" title="Manage agents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="icon-btn" id="btn-open" title="Change project folder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="btn-primary" id="btn-save" title="Save changes (Ctrl+S)" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>

    <div class="avatar-wrap" title="You">
      <div class="avatar avatar--user">U</div>
    </div>
  </header>

  <!-- ── BODY ─────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="side-section">
        <div class="side-label">Workspace</div>
        <button class="side-item is-disabled" type="button" title="Coming soon">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          Home
        </button>
        <button class="side-item is-disabled" type="button" title="Coming soon">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          </span>
          Inbox
          <span class="count" id="sidebar-pending-count">0</span>
        </button>
        <button class="side-item is-disabled" type="button" title="Coming soon">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M9 16s1 1 3 1 3-1 3-1"/></svg>
          </span>
          Agent runs
          <span class="count" id="sidebar-runs-count">0</span>
        </button>
      </div>

      <div class="side-section">
        <div class="side-label">Projects</div>
        <div id="project-list"></div>
        <button class="sidebar-add-btn" id="btn-add-project" type="button">＋ New Project</button>
      </div>

      <div class="side-section side-section--collapsed">
        <div class="side-label">Saved views</div>
        <div class="side-item is-disabled" title="Coming in U4">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </span>
          (none yet)
        </div>
      </div>

      <div id="sidebar-summary">
        <div class="summary-title">Summary</div>
        <div id="summary-rows"></div>
      </div>
    </aside>

    <!-- ── MAIN ────────────────────────────────────────────────────── -->
    <main class="main">

      <!-- WELCOME (shown when no project loaded) -->
      <div id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:56px;height:56px;color:var(--accent)"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="welcome-title">PwTask</div>
        <div id="welcome-msg" class="welcome-desc" style="min-height:40px"></div>
        <div class="welcome-folder-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--text-2);flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="current-dir-display"></span>
          <button class="btn-secondary btn-sm" id="btn-open-welcome" type="button">Change…</button>
        </div>
      </div>

      <!-- PROJECT VIEW (shown when project active) -->
      <div id="project-view" style="display:none">

        <!-- PROJECT HEADER -->
        <div class="proj-header">
          <div class="proj-title-row">
            <div class="proj-icon" id="project-dot-big"></div>
            <div class="proj-title-block">
              <h1 class="proj-title" id="project-title-text"></h1>
              <div class="proj-meta-line">
                <span id="project-desc-text"></span>
                <span id="project-goal-text"></span>
                <span id="project-workdir-text"></span>
                <span id="project-id-text"></span>
              </div>
            </div>

            <div class="proj-actions">
              <button class="btn-secondary" id="btn-run-project" type="button" style="display:none" title="Run project command">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
                Run
              </button>
              <button class="btn-secondary" id="btn-terminal" type="button" style="display:none" title="Open terminal here">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                Terminal
              </button>
              <button class="btn-accent-soft" id="btn-plan-project" type="button" title="Plan project tasks with AI">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
                Plan with AI
              </button>
              <button class="icon-btn" id="btn-edit-project" type="button" title="Edit project">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="icon-btn" id="btn-export-claude" type="button" title="Generate CLAUDE.md">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </button>
              <button class="icon-btn icon-btn--danger" id="btn-delete-project" type="button" title="Delete project">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </div>

          <div class="view-tabs" id="view-tabs">
            <button class="view-tab active" data-view="list" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              List
            </button>
            <button class="view-tab" data-view="board" type="button" title="Coming soon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="6" height="18" rx="1"/><rect x="11" y="3" width="6" height="12" rx="1"/><rect x="19" y="3" width="2" height="6" rx="1"/></svg>
              Board
            </button>
            <button class="view-tab" data-view="timeline" type="button" title="Coming soon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="13" y2="18"/></svg>
              Timeline
            </button>
            <button class="view-tab" data-view="calendar" type="button" title="Coming soon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Calendar
            </button>
          </div>
        </div>

        <!-- TOOLBAR 2 (filters) -->
        <div class="toolbar2" id="filters-bar">
          <div class="search-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="search-input" placeholder="Search tasks…" type="text">
          </div>
          <select class="filter-pill-select" id="filter-status">
            <option value="">All status</option>
            <option value="todo">Todo</option>
            <option value="in_progress">In progress</option>
            <option value="pending_review">Pending review</option>
            <option value="done">Done</option>
            <option value="blocked">Blocked</option>
          </select>
          <select class="filter-pill-select" id="filter-agent">
            <option value="">All agents</option>
          </select>
          <select class="filter-pill-select" id="filter-priority">
            <option value="">All priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button class="filter-pill-clear" id="btn-clear-filters" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Clear
          </button>
          <span style="flex:1"></span>
          <span class="toolbar2-count" id="task-count-display"></span>
        </div>

        <!-- VIEW CONTAINERS -->
        <div class="content-area">
          <div class="view-pane" id="task-list-view">
            <div id="task-list-wrap">
              <button class="new-task-btn" id="btn-add-task" type="button">＋ New Task</button>
              <div id="task-list"></div>
            </div>
          </div>

          <div class="view-pane" id="board-view" style="display:none">
            <div class="board" id="board-container"></div>
          </div>

          <div class="view-pane view-pane--placeholder" id="timeline-view" style="display:none">
            <div class="placeholder-card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--text-3)"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="13" y2="18"/></svg>
              <div class="placeholder-title">Timeline view — coming soon</div>
              <div class="placeholder-desc">Gantt-lite timeline based on createdAt + estimated duration.</div>
            </div>
          </div>

          <div class="view-pane view-pane--placeholder" id="calendar-view" style="display:none">
            <div class="placeholder-card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--text-3)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <div class="placeholder-title">Calendar view — coming soon</div>
              <div class="placeholder-desc">Month grid with tasks placed by createdAt.</div>
            </div>
          </div>

          <!-- DETAIL DRAWER (slides in from right) -->
          <aside id="detail-panel" class="detail-drawer" style="display:none">
            <div id="detail-header">
              <button class="ws-back-btn" id="detail-close" type="button" title="Close (Esc)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
              <span id="ws-proj-name" class="ws-proj-name"></span>
              <span id="detail-title-text" style="display:none"></span>
            </div>
            <div id="detail-body"></div>
          </aside>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- DRAWER BACKDROP (clicks close drawer) -->
<div id="drawer-backdrop" class="drawer-backdrop" style="display:none"></div>

<div id="toast"></div>

<!-- marked: Markdown renderer (~25KB gzipped) — loaded from CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<!-- ES Modules: dependency graph resolved via import statements; load order auto-managed -->
<script type="module" src="js/main.js"></script>
</body>
</html>
