<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Task Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── TOPBAR ──────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="window-title-region" data-tauri-drag-region>
      <div class="brand" data-tauri-drag-region>
        <div class="brand-mark" data-tauri-drag-region>P</div>
        <div class="brand-name" data-tauri-drag-region>PwTask</div>
      </div>

      <!-- Project name + desc shown here when a project is active -->
      <div id="topbar-project" class="topbar-project" style="display:none" data-tauri-drag-region>
        <div id="topbar-proj-dot" class="topbar-proj-dot" data-tauri-drag-region></div>
        <div class="topbar-proj-info" data-tauri-drag-region>
          <span id="topbar-proj-name" class="topbar-proj-name" data-tauri-drag-region></span>
          <span id="topbar-proj-desc" class="topbar-proj-desc" data-tauri-drag-region></span>
        </div>
      </div>

      <span class="topbar-spacer" data-tauri-drag-region></span>
    </div>

    <span id="save-status"></span>
    <button class="btn-primary btn-sm" id="btn-save" title="Save (Ctrl+S)" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button class="icon-btn" id="btn-theme" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" id="btn-open" title="Change folder" aria-label="Change folder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="icon-btn" id="btn-font-size" type="button" title="Cycle font size" aria-label="Cycle font size">A</button>
    <button class="icon-btn" id="btn-agent-mgr" title="Manage agents" aria-label="Manage agents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="window-close-btn" id="btn-window-close" type="button" title="Close app" aria-label="Close app">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </header>

  <!-- ── BODY ─────────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- ── SIDEBAR (Projects + Summary only) ──────────────────────────── -->
    <aside class="sidebar">
      <div class="side-section">
        <div class="side-label">Projects</div>
        <div id="project-list"></div>
        <button class="sidebar-add-btn" id="btn-add-project" type="button">＋ New Project</button>
      </div>
      <div id="sidebar-summary">
        <div class="summary-title">Summary</div>
        <div id="summary-rows"></div>
      </div>
    </aside>

    <!-- ── MAIN ──────────────────────────────────────────────────────── -->
    <main class="main">

      <!-- WELCOME -->
      <div id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:56px;height:56px;color:var(--accent)"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="welcome-title">PwTask</div>
        <div id="welcome-msg" class="welcome-desc" style="min-height:40px"></div>
        <div class="welcome-folder-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="current-dir-display"></span>
          <button class="btn-secondary btn-sm" id="btn-open-welcome" type="button">Change…</button>
        </div>
      </div>

      <!-- PROJECT VIEW -->
      <div id="project-view" style="display:none">

        <!-- TAB BAR — view tabs + project actions + task controls -->
        <div class="view-tabs" id="view-tabs">
          <!-- View switcher -->
          <button class="view-tab active" data-view="list" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            List
          </button>
          <button class="view-tab" data-view="board" type="button" title="Coming soon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="6" height="18" rx="1"/><rect x="11" y="3" width="6" height="12" rx="1"/><rect x="19" y="3" width="2" height="6" rx="1"/></svg>
            Board
          </button>

          <!-- Project actions (hidden when no project) -->
          <div class="tab-sep" id="proj-quick-actions" style="display:none">
            <button class="tab-action-btn" id="btn-run-project" style="display:none" title="Run project command">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
              Run
            </button>
            <button class="tab-action-btn" id="btn-terminal" style="display:none" title="Open terminal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
              Terminal
            </button>
            <button class="tab-action-btn tab-action-btn--accent" id="btn-plan-project" title="Plan with AI">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
              Plan
            </button>
            <button class="tab-icon-btn" id="btn-edit-project" title="Edit project" aria-label="Edit project">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="tab-icon-btn" id="btn-export-claude" title="Generate CLAUDE.md" aria-label="Generate CLAUDE.md">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </button>
            <button class="tab-icon-btn tab-icon-btn--danger" id="btn-delete-project" title="Delete project" aria-label="Delete project">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>

          <span style="flex:1"></span>

          <!-- Task controls -->
          <button class="tab-action-btn" id="btn-filter-toggle" title="Show/hide filters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filter
          </button>
          <button class="tab-action-btn tab-action-btn--primary" id="btn-add-task" type="button">
            ＋ New Task
          </button>
          <span class="tab-count" id="task-count-display"></span>
        </div>

        <!-- FILTER BAR (hidden by default) -->
        <div class="toolbar2" id="filters-bar" style="display:none">
          <div class="search-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="search-input" placeholder="Search tasks…" type="text">
          </div>
          <select class="filter-pill-select" id="filter-status">
            <option value="">All status</option>
            <option value="todo">Todo</option>
            <option value="in_progress">In progress</option>
            <option value="pending_review">Pending review</option>
            <option value="done">Done</option>
            <option value="blocked">Blocked</option>
          </select>
          <select class="filter-pill-select" id="filter-agent">
            <option value="">All agents</option>
          </select>
          <select class="filter-pill-select" id="filter-priority">
            <option value="">All priority</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button class="filter-pill-clear" id="btn-clear-filters" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Clear
          </button>
          <span style="flex:1"></span>
          <button class="filter-pill-clear" id="btn-bulk-select" type="button" title="Multi-select tasks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="5" width="4" height="4" rx="1"/><rect x="3" y="12" width="4" height="4" rx="1"/><rect x="3" y="19" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><line x1="10" y1="14" x2="21" y2="14"/><line x1="10" y1="21" x2="21" y2="21"/></svg>
            Select
          </button>
        </div>

        <!-- VIEW CONTAINERS -->
        <div class="content-area">
          <div class="view-pane" id="task-list-view">
            <div id="bulk-bar" class="bulk-bar" style="display:none">
              <span class="bulk-bar-info"><span id="bulk-count">0</span> selected</span>
              <div class="bulk-bar-actions">
                <button class="btn-sm btn-secondary" id="bulk-done" type="button">Mark Done</button>
                <button class="btn-sm btn-secondary" id="bulk-in-progress" type="button">In Progress</button>
                <button class="btn-sm btn-secondary" id="bulk-todo" type="button">Todo</button>
              </div>
              <button class="btn-sm btn-ghost" id="bulk-cancel" type="button">Cancel</button>
            </div>
            <div id="task-list-wrap">
              <div id="task-list"></div>
            </div>
          </div>

          <div class="view-pane" id="board-view" style="display:none">
            <div class="board" id="board-container"></div>
          </div>


          <!-- DETAIL DRAWER -->
          <aside id="detail-panel" class="detail-drawer" style="display:none">
            <div id="detail-header">
              <button class="ws-back-btn" id="detail-close" type="button" title="Close (Esc)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
              <span id="ws-proj-name" class="ws-proj-name"></span>
              <span id="detail-title-text" style="display:none"></span>
            </div>
            <div id="detail-body"></div>
          </aside>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="drawer-backdrop" class="drawer-backdrop" style="display:none"></div>
<div id="toast"></div>

<!-- hidden functional buttons (needed by JS, no visible UI) -->
<div style="display:none">
  <button id="btn-archive" type="button"></button>
  <button id="btn-sync" type="button"></button>
</div>

<!-- COMMAND PALETTE (⌘K) -->
<div id="palette-overlay" class="palette-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Command palette">
  <div class="palette-dialog">
    <div class="palette-input-wrap">
      <svg class="palette-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="palette-input" class="palette-input" placeholder="Search tasks, projects… or › for actions" autocomplete="off" spellcheck="false">
      <kbd class="palette-esc-hint">Esc</kbd>
    </div>
    <div id="palette-results" class="palette-results"></div>
    <div class="palette-footer">
      <span><kbd>↑↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>&gt;</kbd> actions</span>
    </div>
  </div>
</div>

<!-- KEYBOARD HELP (?) -->
<div id="help-overlay" class="palette-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
  <div class="help-dialog">
    <div class="help-header">
      <span>Keyboard Shortcuts</span>
      <button id="help-close" class="help-close-btn" type="button" title="Close">✕</button>
    </div>
    <div class="help-body">
      <div class="help-section">
        <div class="help-section-title">Global</div>
        <div class="help-row"><kbd>⌘K</kbd><span>Command palette</span></div>
        <div class="help-row"><kbd>⌘S</kbd><span>Save</span></div>
        <div class="help-row"><kbd>⌘Z / ⌘Y</kbd><span>Undo / Redo</span></div>
        <div class="help-row"><kbd>?</kbd><span>Show this help</span></div>
        <div class="help-row"><kbd>Esc</kbd><span>Close panel / modal</span></div>
      </div>
      <div class="help-section">
        <div class="help-section-title">Tasks</div>
        <div class="help-row"><kbd>N</kbd><span>New task</span></div>
        <div class="help-row"><kbd>/</kbd><span>Focus search</span></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
